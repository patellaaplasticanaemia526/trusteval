<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <!-- Shield shape -->
  <path d="M100 25 L155 50 L155 110 Q155 145 100 175 Q45 145 45 110 L45 50 Z"
        fill="url(#shieldGrad)" stroke="#818CF8" stroke-width="1.5"/>
  <!-- Circuit pattern inside shield -->
  <line x1="75" y1="70" x2="100" y2="70" stroke="url(#circuitGrad)" stroke-width="2"/>
  <line x1="100" y1="70" x2="125" y2="70" stroke="url(#circuitGrad)" stroke-width="2"/>
  <line x1="100" y1="70" x2="100" y2="95" stroke="url(#circuitGrad)" stroke-width="2"/>
  <line x1="75" y1="95" x2="125" y2="95" stroke="url(#circuitGrad)" stroke-width="2"/>
  <line x1="85" y1="95" x2="85" y2="115" stroke="url(#circuitGrad)" stroke-width="2"/>
  <line x1="115" y1="95" x2="115" y2="115" stroke="url(#circuitGrad)" stroke-width="2"/>
  <circle cx="75" cy="70" r="3" fill="#818CF8"/>
  <circle cx="125" cy="70" r="3" fill="#818CF8"/>
  <circle cx="75" cy="95" r="3" fill="#818CF8"/>
  <circle cx="125" cy="95" r="3" fill="#818CF8"/>
  <circle cx="85" cy="115" r="3" fill="#818CF8"/>
  <circle cx="115" cy="115" r="3" fill="#818CF8"/>
  <!-- Checkmark -->
  <polyline points="80,100 95,118 125,78" fill="none" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
